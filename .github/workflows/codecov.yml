name: "Code Coverage"

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # pin@v4
      - uses: actions/setup-go@cdcb36043654635271a94b9a6d1392de5bb323a7 # pin@v5
        with:
          go-version: '1.22'
          check-latest: true
      - name: Optional init
        run: make dependencies || true # Used in fortio for instance to prep for go tests
      - name: Run test coverage
        run: go test -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@54bcd8715eee62d40e33596ef5e8f0f48dbbccab # pin@v4
        with:
          files: coverage.out
